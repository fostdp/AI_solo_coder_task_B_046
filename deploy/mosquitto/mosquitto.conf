# ============================================================
# Eclipse Mosquitto MQTT Broker 配置
# ============================================================

# 监听器 - 默认MQTT端口
listener 1883
protocol mqtt

# WebSocket端口（可选，前端浏览器连接用）
listener 9001
protocol websockets

# 持久化会话支持 (对应 alarm_publisher v2.0 clean_session=False)
persistence true
persistence_location /mosquitto/data/

# 消息队列大小 (离线消息保存)
max_inflight_bytes 0
max_queued_bytes 0
max_queued_messages 10000
memory_limit 0

# 连接参数
connection_messages true
log_type all

# 保留消息支持
retain_available true

# 遗嘱消息支持
allow_zero_length_clientid false
auto_id_prefix water-heritage-

# QoS支持
maximum_qos 2

# 调试日志
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log

# 关闭匿名认证（生产环境请配置用户名密码）
allow_anonymous true

# 持久化自动保存
autosave_interval 60
autosave_on_changes true
