upstream backend_gateway {
    server gateway:8000;
    keepalive 32;
}

upstream agriculture_servers {
    server agriculture-impact:8005;
    keepalive 32;
}

upstream network_servers {
    server network-analyzer:8006;
    keepalive 32;
}

upstream climate_servers {
    server climate-vulnerability:8007;
    keepalive 32;
}

upstream digital_servers {
    server digital-exhibit:8008;
    keepalive 32;
}

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # 静态资源缓存头
    expires $expires;
    add_header Cache-Control "public";

    # ============================================================
    # 前端页面 - HTML5 History模式 (SPA)
    # ============================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # 静态文件 (CSS/JS/图片) - 带ETag + Gzip
    # ============================================================
    location ~* \.(css|js|json|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ============================================================
    # API 反向代理到 FastAPI 网关
    # ============================================================
    location /api/ {
        proxy_pass         http://backend_gateway;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE/WebSocket支持
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout   60s;
        proxy_send_timeout      600s;
        proxy_read_timeout      600s;
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           4 64k;

        # FastAPI大响应（GeoJSON/剖面图）
        client_max_body_size    50M;
    }

    # ============================================================
    # 农业影响评估 API
    # ============================================================
    location /api/v1/agriculture/ {
        proxy_pass         http://agriculture_servers/api/v1/agriculture/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout   60s;
        proxy_send_timeout      600s;
        proxy_read_timeout      600s;
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           4 64k;

        client_max_body_size    20m;
    }

    # ============================================================
    # 网络分析 API
    # ============================================================
    location /api/v1/network/ {
        proxy_pass         http://network_servers/api/v1/network/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout   60s;
        proxy_send_timeout      600s;
        proxy_read_timeout      600s;
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           4 64k;

        client_max_body_size    20m;
    }

    # ============================================================
    # 气候脆弱性 API
    # ============================================================
    location /api/v1/climate/ {
        proxy_pass         http://climate_servers/api/v1/climate/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout   60s;
        proxy_send_timeout      900s;
        proxy_read_timeout      900s;
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           4 64k;

        client_max_body_size    50m;
    }

    # ============================================================
    # 数字展陈 API
    # ============================================================
    location /api/v1/digital/ {
        proxy_pass         http://digital_servers/api/v1/digital/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout   60s;
        proxy_send_timeout      1800s;
        proxy_read_timeout      1800s;
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           4 64k;

        client_max_body_size    500m;
    }

    # ============================================================
    # 3D模型静态文件服务
    # ============================================================
    location /models/digital/ {
        alias /app/data/models/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
        types {
            model/gltf-binary glb;
            model/gltf+json gltf;
        }
    }

    # ============================================================
    # VR体验页面静态文件
    # ============================================================
    location /vr/ {
        alias /app/frontend/vr/;
        expires 7d;
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # 健康检查
    # ============================================================
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"frontend-nginx"}';
    }

    # ============================================================
    # 错误页面
    # ============================================================
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
